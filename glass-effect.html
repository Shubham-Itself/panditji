<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Glass Effect Webpage</title>\n    <style>\n        body {\n            background: #f0f0f0;\n            font-family: Arial, sans-serif;\n            margin: 0;\n            padding: 0;\n        }\n        .container {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n        }\n        .card {\n            background: rgba(255, 255, 255, 0.2);\n            backdrop-filter: blur(10px);\n            border-radius: 15px;\n            padding: 20px;\n            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);\n            margin: 20px;\n            transition: transform 0.3s;\n        }\n        .card:hover {\n            transform: scale(1.05);\n        }\n        h2 {\n            color: #333;\n        }\n        button {\n            background: rgba(0, 123, 255, 0.7);\n            color: white;\n            border: none;\n            border-radius: 5px;\n            padding: 10px 20px;\n            cursor: pointer;\n            transition: background 0.3s;\n        }\n        button:hover {\n            background: rgba(0, 123, 255, 1);\n        }\n    </style>\n</head>\n<body>\n    <nav style="padding: 15px; background: rgba(0, 0, 0, 0.5);\n    color: white;">\n        <h1>Glass Effect Navbar</h1>\n    </nav>\n    <div class="container">\n        <div class="card">\n            <h2>Welcome to Glassmorphism</h2>\n            <p>This is an example of a glass effect webpage with cards and interactive elements.</p>\n            <button onclick="alert('Button Clicked!')">Click Me!</button>\n        </div>\n        <div class="card">\n            <h2>Another Card</h2>\n            <p>Here is another card to showcase the glass effect.</p>\n            <button onclick="alert('Another Button Clicked!')">Click Me Too!</button>\n        </div>\n    </div>\n    <script>\n        // Any additional JavaScript can go here\n    </script>\n</body>\n</html>
